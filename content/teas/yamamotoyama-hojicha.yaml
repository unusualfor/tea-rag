  - water_temp_c: 90
    steep_time_seconds: 45
  notes: 'Hojicha tolerates higher water temperatures than most green teas because the roasting has driven off astringent
    compounds. Per Yamamotoyama''s instructions: 3-5g per 200-240ml at 80-90°C, 30s-1min. Second infusion will be lighter
    but still aromatic. Loose-leaf preferred over teabags; with bags use 30s-1min boiling water. Excellent cold-brewed (4+
    hours in fridge).'
notes: |
  Roasted (hojicha) green tea — lower caffeine than steamed green
  teas thanks to the roasting process. Aroma profile: toasty,
  caramelized, nutty, slightly woody. Easy on the stomach, suitable
  for evening drinking and after meals. Yamamotoyama's standard
  hojicha is a reliable everyday roaster; nothing exceptional but
  consistently well-made by a 300+ year house.
