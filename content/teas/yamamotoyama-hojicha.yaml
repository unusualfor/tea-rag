id: yamamotoyama-hojicha
name:
  primary: Yamamotoyama Hojicha
  alternate: 山本山ほうじ茶
category: hojicha
category_label: Hojicha (roasted green tea)
producer:
  name: Yamamotoyama
  history: 'Japanese tea house founded in 1690 in Nihonbashi, Edo (modern Tokyo) by Kahei Yamamoto. One of Japan''s oldest
    and most established tea companies (335+ years), now operating as Yamamotoyama USA in addition to its Japanese operations.
    Their hojicha blends two roasting intensities: lightly roasted leaves for a bright top note and deeply roasted leaves
    for nutty depth. Made from 100% domestically grown Japanese tea leaves.'
