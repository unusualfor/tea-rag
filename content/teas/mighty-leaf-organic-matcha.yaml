id: mighty-leaf-organic-matcha
name:
  primary: Mighty Leaf Organic Matcha
  alternate: null
category: matcha-ceremonial
category_label: Matcha (ceremonial grade, organic)
producer:
  name: Mighty Leaf
  history: Mighty Leaf is a US tea brand founded in 1996 in Mill Valley, California; acquired in 2014 by Peet's Coffee (now
    part of JDE Peet's). Their organic matcha is sourced from Kagoshima and Shizuoka prefectures in Japan, stone-milled in
    temperature-controlled, sealed production rooms to preserve freshness. The leaves are tencha (shade-grown for ~3 weeks
    before harvest, de-veined, and powdered). Marketed as ceremonial grade — bright emerald, creamy, with bittersweet floral
    notes. Standard fine usucha-grade powder rather than a koicha-tier specialty.
origin:
