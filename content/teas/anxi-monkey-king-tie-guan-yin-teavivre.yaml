producer:
  name: TeaVivre
  history: Sourced from the Fujing Tea Garden in Huqiu, one of the main Tie Guan Yin production areas in Anxi County, Fujian
    (500-800m elevation). 'Ma Liu Mie' is Hokkien for 'monkey-picked' — the name comes from a legend that the cliffs where
    the tea grows are too steep for human pickers, so monkeys were trained to climb them. Belongs to the zhengchao type of
    Tie Guan Yin. Anxi was named the Home of Chinese Oolong by the Ministry of Agriculture in 1995.
