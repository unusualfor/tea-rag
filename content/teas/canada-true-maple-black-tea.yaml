  name: Canada True (Heart Industries Ltd.)
  history: 'Canada True is a Canadian souvenir brand owned by Heart Industries Ltd., specializing in maple-flavored gift-shop
    products: tea, cookies, fudge, and pure maple syrup. Their tea range targets the Canadian souvenir market with maple-flavored
