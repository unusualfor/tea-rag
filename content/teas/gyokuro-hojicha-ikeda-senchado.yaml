id: gyokuro-hojicha-ikeda-senchado
name:
  primary: Gyokuro Hōjicha
  alternate: 玉露焙じ茶
category: hojicha-from-gyokuro
category_label: Hojicha (from Gyokuro)
producer:
  name: Ikeda Senchado
  history: Private brand of Ikeda Seicha Co. (founded 1948), Tenmonkan, Kagoshima. Run by tea master Kenta Ikeda (茶師十段). This
    premium hōjicha is made by roasting gyokuro leaves (rather than bancha or stems) over the shop's signature 'lit-flame'
    (烈火) high-heat roasting process. The roasting preserves residual umami from the shaded gyokuro base while developing nutty,
    toasted notes.
