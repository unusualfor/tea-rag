id: gyokuro-zuigyoku-kanbayashi
name:
  primary: Gyokuro 'Zuigyoku'
  alternate: 瑞玉
category: gyokuro
category_label: Gyokuro (premium)
producer:
  name: Kanbayashi Shunsho Honten
  history: One of Japan's oldest tea houses, founded in the Eiroku era (1558-1569), now in its 14th generation. Suppliers
    to the Tokugawa Shogunate — the Kanbayashi family held the highest rank of 'Goyō ochashi' (御物御茶師, official imperial tea
    masters) under the early Tokugawa shogunate. Centuries-old lineage from Uji. The family contributed to the development
    of the Kyō Midori (gyokuro) and Uji Hikari (tencha/gyokuro) cultivars used today. Operates from Uji-bashi Dori in Uji
    City.
