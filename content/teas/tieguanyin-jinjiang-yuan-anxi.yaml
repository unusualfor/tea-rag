  history: Chinese tea brand (晋江源茶业, 'Jinjiang Source Tea Company'), based in or near Jinjiang/Anxi, Fujian Province. Anxi
    County in southern Fujian is the historic birthplace of Tieguanyin and was named the 'Home of Chinese Oolong Tea' by the
    Ministry of Agriculture in 1995. Producer details limited — Francesco can confirm packaging notes if available. The Tieguanyin
    cultivar is grown across Anxi (Inner Anxi at 800-1000m+ for premium grades; Outer Anxi at lower altitudes for everyday
    grades).
