id: satsuki-tsuyu-kusano-seichaen
name:
  primary: Satsuki Tsuyu
  alternate: さつき露
category: tamaryokucha
category_label: Tamaryokucha
producer:
  name: Kusano Seichaen
  history: Tea producer and shop in Ureshino Onsen, Saga prefecture (Kyushu). 'Satsuki Tsuyu' (さつき露, 'May Dew') is one of
    their signature tamaryokucha products, marketed under the regional moniker 'Yushuku Meicha' (湯宿銘茶, 'famous tea of the
    hot-spring inn town' — Yushuku being a poetic reference to Ureshino's onsen-town identity). Kusano's 'Tsuyukabuse' tea
    has won the Fine Product Award at the National Japanese Tea Competition. Ureshino is one of the few Japanese regions still
    producing tamaryokucha at scale — a curled-leaf style predating the modern needle-shaped sencha.
