producer:
  name: TeaVivre
  history: Blend of 2013 Liu Bao tea (Wuzhou, Guangxi) with aged Xinhui mandarin peel (chenpi) from Guangdong. Liu Bao is
    a fermented dark tea named after Liu Bao Xiang in Guangxi, with pile-fermentation processing similar to ripe pu-erh. Xinhui
    is the most famous origin for chenpi — Citrus reticulata Blanco cv. Chachiensis — valued in Traditional Chinese Medicine
    for digestive properties. The combination is a classic post-meal tea in southern China.
