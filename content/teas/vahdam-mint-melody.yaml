producer:
  name: Vahdam India
  history: 'Vahdam India is a Delhi-based direct-to-consumer tea brand founded in 2015 by Bala Sarda. They source from over
    150 plantations across India''s main tea regions (Darjeeling, Assam, Nilgiri, Kangra, Sikkim) and ship globally. Certified
    carbon-neutral and plastic-neutral, they donate 1% of revenue to tea-grower children''s education through their ''Teach
    Me'' initiative. Mint Melody is one of their flagship green-tea blends: high-grown Himalayan green tea (50%) + spearmint
    (25%) + peppermint (25%).'
