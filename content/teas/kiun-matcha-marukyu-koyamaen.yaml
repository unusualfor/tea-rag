  notes: 'Primarily a koicha (thick tea): 4g matcha + 30ml water at 80°C, kneaded slowly with chasen. Also drinkable as usucha
    (thin tea): 2g matcha + 70ml water at 80°C, whisked to a fine froth. Sift before whisking. Best-before period from Marukyu:
    7 months from canning (refrigerate after opening, finish in 2-3 weeks).'
notes: |
  Ceremonial-grade matcha favored by the 15th Grand Tea Master of
  Urasenke. Pumpkin-seed-like aroma, full-bodied umami sweetness with
  almost no astringency. Designed for koicha but works exceptionally
  well as everyday usucha; widely regarded as one of the best
  value-for-money premium matchas.
