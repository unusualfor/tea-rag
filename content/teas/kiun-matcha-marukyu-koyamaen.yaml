producer:
  name: Marukyu Koyamaen
  history: 'Historic Uji-based matcha producer. Kiun is part of the Tea Schools Favored Matcha line, selected by Hōunsai (Sen
    Genshitsu, the 15th Grand Tea Master of Urasenke). Marukyu Koyamaen consistently wins top awards at the National Tea Competition.
    Note: this tea is produced in Uji, not in Kyushu — it was acquired during a Kyushu trip (likely from a tea shop reselling
    Marukyu line) but the production origin is Uji.'
