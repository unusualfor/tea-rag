producer:
  name: The Republic of Tea
  history: The Republic of Tea is a US tea brand founded in 1992 in Northern California by Mel and Patricia Ziegler (Banana
    Republic founders) and Bill Rosenzweig. Their Organic Ceremonial Matcha is described as 'organic shade-grown tea made
    from young tencha leaves and stone-ground into a fine powder' — Japan-sourced tencha, US-distributed. Sold in small tins
    (4 servings each) and as part of multi-matcha gift sets including flavored variants (Sweet Vanilla, Dubai Chocolate, Strawberry,
    Lavender).
