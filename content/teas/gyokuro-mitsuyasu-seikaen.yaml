producer:
  name: Mitsuyasu Seikaen
  history: Historic Fukuoka tea shop founded in 1716, currently in its 13th generation. Based in Hakata (Fukuoka City), specializes
    in Yame tea. Yame (Fukuoka prefecture) is one of Japan's premier gyokuro production regions and accounts for approximately
    half of Japan's gyokuro output. The shop runs an adjoining tea house (Chayu Seika) and supplies traditional tea ceremony
    practitioners.
