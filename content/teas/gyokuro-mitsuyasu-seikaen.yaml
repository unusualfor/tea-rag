  - water_temp_c: 50
    steep_time_seconds: 120
  notes: 'Yame-style gyokuro brewing: very low temperature, high leaf-to-water ratio. First infusion: 50°C, 120s. Second:
    50°C, 30s. Third: 60°C, 60s. Cool the water (boil and let cool, or pour through cooling vessels). Use shiboridashi or
    houhin for low-temperature pours; kyusu also works. Yame gyokuro often takes a slightly higher temperature than Uji gyokuro.'
notes: |
  Authentic Yame gyokuro from a 300+ year old tea shop. Yame is regarded
  as Japan's top gyokuro region alongside Uji; its gyokuro tends to be
  full-bodied with strong umami. Shaded for ~20 days before harvest to
  develop the characteristic L-theanine sweetness. Ideal companion: a
  small piece of wagashi to balance the intense umami.
