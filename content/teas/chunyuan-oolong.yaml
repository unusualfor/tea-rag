  notes: 'Per producer instructions: 1 tea bag in 250ml boiling water, steep 3-4 minutes. Boiling water is appropriate for
    oolong but in this product the leaf grade and roasting level are unspecified, so brewing is approximated as a moderately
    oxidized ''standard'' oolong. A second steep is feasible but will be lighter than the first. Don''t compare to gongfu-style
    preparations of premium oolongs (Tie Guan Yin, Da Hong Pao, etc.) — this is a different category.'
notes: |
  Generic commercial oolong in tea-bag format. Without disclosed
  cultivar, oxidation level, or roast profile, expect a middle-of-
  the-road semi-oxidized green/amber liquor with light floral and
  honey notes. Stable shelf life; oolong is more forgiving than
  green tea on storage. Best treated as an everyday/utility tea
  rather than a tasting tea.
