producer:
  name: Chunyuan Tea Houses
  history: Chunyuan Tea Houses (椿源居) is a Chinese tea brand distributed mainly via Asian groceries in North America. Their
    organic oolong is sold in 100-tea-bag boxes (~168g total, ~1.7g per bag) — a value/everyday-tier product rather than a
    traditional gongfu single-origin oolong. Producer claims hand-picked organic leaves from 'tea gardens nestled in the heart
    of Asia,' but specific origin (Fujian, Taiwan, etc.) is not disclosed.
