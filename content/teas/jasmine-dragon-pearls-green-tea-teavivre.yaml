id: jasmine-dragon-pearls-green-tea-teavivre
name:
  primary: Jasmine Dragon Pearls Green Tea
  alternate: 茉莉龙珠
category: green-chinese
category_label: Chinese Green
producer:
  name: TeaVivre
  history: Online Chinese tea retailer founded in 2011, sourcing directly from tea gardens. This blend uses high-mountain
    Jinggu Dabai Cha leaves from the Wen Shan tea garden in Jinggu County, Yunnan (~1800m altitude), hand-rolled into pearls
    and scented with jasmine flowers from Hengxian, Guangxi (China's primary jasmine production region). Three rounds of scenting
    plus a final 'tihua' top-scenting (三窨一提).
