producer:
  name: TeaVivre
  history: Sourced from the Nanguang Tea Garden west of Mt. Taimu in Panxi, Fuding, Fujian (600-900m elevation, 80% forested).
    Made from Fuding Dabaihao cultivar (national tea plant variety since 1985). Lightly oxidized white tea, processed via
    natural withering — same technique as Silver Needle, but using one bud + opened leaves rather than buds only. White Peony
    was first produced in the Shuiji area of Zhenghe county, Fujian, in the 1870s.
