  name: TeaVivre
  history: Online Chinese tea retailer founded in 2011. Long Zhu pearls produced at the Wengxi Tea Garden in Fuding, Fujian.
    Tea base picked one bud + one or two leaves; hand-rolled into pearls. Crafted by Mr. Chen, a tea master with 40+ years
    of jasmine tea experience. Five rounds of scenting plus a final 'yi-ti' top-scenting using first-grade jasmine flowers
    (6-8 hours, 6-8kg flowers per 100kg of tea).
