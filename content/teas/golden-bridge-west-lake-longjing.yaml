producer:
  name: Golden Bridge brand
  history: Generic Chinese export brand; specific producing entity not well-documented in English-language sources. Multiple
    Chinese tea exporters use 'Golden Bridge' or '金桥' branding for value-tier teas distributed via Asian grocery channels.
    The product is a 'West Lake Longjing' (Xī Hú Lóng Jǐng), one of China's Ten Famous Teas, traditionally produced around
    West Lake in Hangzhou, Zhejiang province. Authentic core-area Longjing requires anti-counterfeiting certification per
    the Hangzhou West Lake Longjing Tea Industry Association (since 2020) — an unbranded export tea labelled 'West Lake Longjing'
    may or may not actually originate from the protected core area.
