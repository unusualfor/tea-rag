category: genmaicha
category_label: Genmaicha
producer:
  name: Yamamotoyama
  history: Japanese tea house founded in 1690 in Nihonbashi, Edo (modern Tokyo) by Kahei Yamamoto. One of Japan's oldest and
    most established tea companies. Their genmaicha combines steamed green tea leaves with roasted brown rice (some grains
    pop into puffy white kernels during roasting), historically a poor-person's tea that has become a beloved everyday Japanese
    tea worldwide.
