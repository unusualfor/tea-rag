brewing:
  vessel: chawan
  leaf_grams_per_100ml: 13
  rounds:
  - water_temp_c: 80
    steep_time_seconds: 0
    water_ml: 30
  notes: 'Designed primarily for koicha (thick tea): 4g matcha + 30ml water at 80°C, kneaded slowly with chasen until smooth
    and syrupy (no foam). Also drinkable as usucha (thin tea): 2g + 70ml at 80°C, whisked to a fine froth. Sift before whisking
    to avoid lumps. Matcha at 6+ months from canning is past peak — consume promptly. Once opened, finish in 2-3 weeks; refrigerate
    sealed in original tin.'
notes: |
  Top-tier ceremonial matcha from a 170+ year-old Uji tea house.
  Velvety mouthfeel, deep umami sweetness, almost no astringency,
  vibrant jade color — hallmarks of a premium koicha-grade matcha.
  Acquired Sep 2025 honeymoon — the powder oxidizes faster than other
  forms of tea, so this is one of the highest-priority items in the
  collection to consume.
