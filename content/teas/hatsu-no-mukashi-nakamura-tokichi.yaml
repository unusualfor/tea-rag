id: hatsu-no-mukashi-nakamura-tokichi
name:
  primary: Matcha 'Hatsu no Mukashi'
  alternate: 初の昔
category: matcha-ceremonial
category_label: Matcha (Ceremonial)
producer:
  name: Nakamura Tokichi Honten
  history: Established in Uji in 1854. The main store buildings are designated as Important Cultural Landscapes by the Japanese
    government (Meiji-era tea merchant architecture). The Nakamura family contributed to developing the Kyōmidori (gyokuro)
    and Ujihikari (tencha/gyokuro) cultivars at the Kyoto Prefectural Tea Research Institute. Hatsu no Mukashi (初の昔, 'First
    of Old') is the top-tier in their 'Mukashi' line of poetic-named matchas; aged 1-2 years before sale to develop full umami.
    Curated in collaboration with the Urasenke Grand Tea Master.
origin:
  region: Uji
  country: Japan
  locality: Kyoto prefecture
