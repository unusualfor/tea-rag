producer:
  name: TeaVivre
  history: 'From the Long Jing Village Tea Garden in Xihu (West Lake), Hangzhou, Zhejiang — the original protected appellation
    for Xihu Long Jing. Uses the Longjing #43 cultivar, certified as a National Improved Variety in 1987 (GSCT 37). Long Jing
    was favored as imperial tribute by Emperor Shunzhi during the Qing Dynasty. The flat, smooth leaf shape is the result
    of pan-firing by hand against a hot wok.'
