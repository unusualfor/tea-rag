id: matcha-ikeda-senchado
name:
  primary: Matcha
  alternate: 抹茶
category: matcha-ceremonial
category_label: Matcha (Ceremonial)
producer:
  name: Ikeda Senchado
  history: Private brand of Ikeda Seicha Co. (founded 1948), based in Tenmonkan, Kagoshima. Run by tea master Kenta Ikeda
    — 茶師十段 (10th-dan tea master), a rare top-level certification. Distinctive 'lit-flame' (烈火) roasting and blending style.
    Kagoshima-grown matcha is rare; Ikeda Senchado is one of the few producers offering certified-organic Kagoshima matcha.
    Specializes in showcasing Kagoshima's tea character (mellow southern-plain teas vs. aromatic northern-mountain teas).
origin:
  region: Kagoshima
  country: Japan
  locality: null
acquisition:
