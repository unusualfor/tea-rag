id: aso-no-megumi-nagata-seicha
name:
  primary: Aso no Megumi
  alternate: 阿蘇のめぐみ
category: sencha-tokusen
category_label: Sencha (premium)
producer:
  name: Nagata Seicha
  history: Small family-run tea producer in Aso (Kumamoto, Kyushu), led by Kōji Nagata. Eco-Farmer certified (low-pesticide
    cultivation philosophy). Won 1st place in the steamed green tea category at the North American Tea Championship. Self-grown
    and self-processed — leaves picked and processed the same day, then vacuum-packed to preserve freshness. The Aso volcanic
    soil and high-altitude mist create a distinctive terroir for green tea.
origin:
  region: Aso
  country: Japan
  locality: Kumamoto prefecture
acquisition:
  location: Kumamoto, Japan
