id: biwa-cha-is-farm-nagasaki
name:
  primary: Biwa-cha
  alternate: びわ茶
category: herbal
category_label: Herbal
producer:
  name: Nagasaki I's Farm
  history: Small Nagasaki-based farm. Nagasaki is one of Japan's two main loquat (biwa) production regions alongside Chiba;
    the smaller 'Mogi' loquat variety is native to Nagasaki City. Biwa-cha is made from the leaves (not the fruit) of the
    loquat tree, traditionally used in Japanese folk medicine and listed in the Pharmacopoeia of Japan since 1886. Caffeine-free.
