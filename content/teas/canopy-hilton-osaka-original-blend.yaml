producer:
  name: Canopy by Hilton Osaka Umeda
  history: 'Hotel-exclusive blend from Canopy by Hilton Osaka Umeda, located in the Grand Green Osaka complex next to Umekita
    Park near Osaka Station. The blend is described on its enclosed card as ''inspired by the beautiful scenery of Umekita
    Park'': a sophisticated mix of black tea (subtly infused with grape aroma), Japanese green tea, and violet petals. Hotel-branded
    souvenir; the actual tea blender is not credited.'
